apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: lightspeed-stack-llm
  namespace: devcluster-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  resyncPeriod: 5m
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folderRef: rhdh-ai-observability
  json: >
    {
      "uid": "lightspeed-stack-llm",
      "title": "Lightspeed Stack — LLM Usage",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "timezone": "browser",
      "panels": [

        {
          "type": "row",
          "title": "LLM Overview",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }
        },

        {
          "type": "stat",
          "title": "Total LLM Calls",
          "description": "Total number of LLM calls made so far.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 5 },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [
            { "expr": "sum(ls_llm_calls_total)", "instant": true }
          ]
        },

        {
          "type": "stat",
          "title": "Failed LLM Calls",
          "description": "Total number of LLM calls that failed.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 5 },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }] }
            }
          },
          "targets": [
            { "expr": "sum(ls_llm_calls_failures_total) or vector(0)", "instant": true }
          ]
        },

        {
          "type": "stat",
          "title": "Validation Errors",
          "description": "Total number of bad responses from the LLM.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 12, "y": 1, "w": 6, "h": 5 },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] }
            }
          },
          "targets": [
            { "expr": "sum(ls_llm_validation_errors_total) or vector(0)", "instant": true }
          ]
        },

        {
          "type": "stat",
          "title": "Active Provider/Model Pairs",
          "description": "Number of provider and model combinations currently set up.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 18, "y": 1, "w": 6, "h": 5 },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [
            { "expr": "count(ls_provider_model_configuration) or vector(0)", "instant": true }
          ]
        },

        {
          "type": "row",
          "title": "API Traffic",
          "gridPos": { "x": 0, "y": 6, "w": 24, "h": 1 }
        },

        {
          "type": "timeseries",
          "title": "REST API Call Rate",
          "description": "How many API requests are coming in per second, broken down by path and status code.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 0, "y": 7, "w": 12, "h": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [
            { "expr": "rate(ls_rest_api_calls_total[5m])", "legendFormat": "{{ path }} {{ status_code }}" }
          ]
        },

        {
          "type": "timeseries",
          "title": "Response Duration p95",
          "description": "How long the slowest 5% of requests take to complete.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 12, "y": 7, "w": 12, "h": 7 },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum by (le) (rate(ls_response_duration_seconds_bucket[5m])))" }
          ]
        },

        {
          "type": "row",
          "title": "LLM Call Rate by Model",
          "gridPos": { "x": 0, "y": 14, "w": 24, "h": 1 }
        },

        {
          "type": "timeseries",
          "title": "LLM Call Rate — 5m",
          "description": "LLM calls per second in the last 5 minutes, per model and provider.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 0, "y": 15, "w": 8, "h": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [
            { "expr": "rate(ls_llm_calls_total[5m])", "legendFormat": "{{ model }} ({{ provider }})" }
          ]
        },

        {
          "type": "timeseries",
          "title": "LLM Call Rate — 1h",
          "description": "LLM calls per second in the last hour, per model and provider.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 8, "y": 15, "w": 8, "h": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [
            { "expr": "rate(ls_llm_calls_total[1h])", "legendFormat": "{{ model }} ({{ provider }})" }
          ]
        },

        {
          "type": "timeseries",
          "title": "LLM Call Rate — 24h",
          "description": "LLM calls per second in the last 24 hours, per model and provider.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 16, "y": 15, "w": 8, "h": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [
            { "expr": "rate(ls_llm_calls_total[1d])", "legendFormat": "{{ model }} ({{ provider }})" }
          ]
        },

        {
          "type": "row",
          "title": "Token Usage",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 1 }
        },

        {
          "type": "timeseries",
          "title": "Tokens Sent Rate",
          "description": "How many tokens are being sent to the LLM per second, per model and provider.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 0, "y": 23, "w": 8, "h": 7 },
          "fieldConfig": { "defaults": { "unit": "cps" } },
          "targets": [
            { "expr": "rate(ls_llm_token_sent_total[5m])", "legendFormat": "{{ model }} ({{ provider }})" }
          ]
        },

        {
          "type": "timeseries",
          "title": "Tokens Received Rate",
          "description": "How many tokens are coming back from the LLM per second. This is the best signal for cost and slowdowns.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 8, "y": 23, "w": 8, "h": 7 },
          "fieldConfig": { "defaults": { "unit": "cps" } },
          "targets": [
            { "expr": "rate(ls_llm_token_received_total[5m])", "legendFormat": "{{ model }} ({{ provider }})" }
          ]
        },

        {
          "type": "timeseries",
          "title": "LLM Failure Rate",
          "description": "How many LLM calls are failing per second, per model and provider.",
          "datasource": { "type": "prometheus", "uid": "prometheus-user-workload" },
          "gridPos": { "x": 16, "y": 23, "w": 8, "h": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [
            { "expr": "rate(ls_llm_calls_failures_total[5m])", "legendFormat": "{{ model }} ({{ provider }})" }
          ]
        }

      ]
    }
