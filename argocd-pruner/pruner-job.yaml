apiVersion: batch/v1
kind: CronJob
metadata:
  name: argocd-template-app-pruner
  namespace: argocd-pruner-ns
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: argocd-pruner-sa
          restartPolicy: Never
          containers:
            - name: prune
              image: quay.io/redhat-ai-dev/utils:latest
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: pruner-secrets
                      key: GITOPS_GIT_TOKEN
                - name: GH_ORG
                  valueFrom:
                    secretKeyRef:
                      name: pruner-secrets
                      key: GITOPS_GIT_ORG
                - name: RHDH_URL
                  value: "http://rolling-demo-backstage-rolling-demo-ns.svc.cluster.local"
                - name: RHDH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: pruner-secrets
                      key: RHDH_TOKEN
              command:
                - /bin/bash
                - -c
                - |
                  #!/bin/bash

                  NAMESPACE="openshift-gitops"
                  LABEL_SELECTOR="backstage-name=rolling-demo"
                  NOW=$(date +%s)

                  # Get applications with the matching label
                  kubectl get applications.argoproj.io -n "$NAMESPACE" -l "$LABEL_SELECTOR" -o json | jq -c '.items[]' | while read -r app; do
                    name=$(echo "$app" | jq -r '.metadata.name')
                    creation_ts=$(echo "$app" | jq -r '.metadata.creationTimestamp')
                    creation_sec=$(date -u -d "${creation_ts}" +"%s" 2>/dev/null || echo 0)

                    echo "Processing application: $name"

                    age=$(( (NOW - creation_sec) / 60 ))
                    if [ "$age" -gt 1440 ]; then
                      echo "Deleting Application: $name (age: ${age}m)"
                      kubectl patch app $name  -p '{"metadata": {"finalizers": ["resources-finalizer.argocd.argoproj.io"]}}' --type merge -n $NAMESPACE
                      kubectl delete app $name -n $NAMESPACE

                      app_repo_name="${name%-app-of-apps}"
                      full_app_repo="$GH_ORG/$app_repo_name"

                      gitops_repo_name="${name%-app-of-apps}-gitops"
                      full_gitops_repo="$GH_ORG/$gitops_repo_name"

                      echo "Deleting GitHub repo: $full_app_repo"
                      curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                      -H "Authorization: token $GH_TOKEN" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/$full_app_repo" | grep -q "204" \
                      && echo "Deleted $full_app_repo" \
                      || echo "Failed to delete $full_app_repo"

                      echo "Deleting GitHub repo: $full_gitops_repo"
                      curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                      -H "Authorization: token $GH_TOKEN" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/$full_gitops_repo" | grep -q "204" \
                      && echo "Deleted $full_gitops_repo" \
                      || echo "Failed to delete $full_gitops_repo"

                      echo "Cleaning Backstage Components for $app_repo_name using URL: $RHDH_URL"
                      component_response=$(curl -s -X GET \
                        -H "Authorization: Bearer $RHDH_TOKEN" \
                        "$RHDH_URL/api/catalog/entities?filter=kind=component,metadata.name=$app_repo_name")
                      component_uid=$(echo "$component_response" | jq -r '.items[0].metadata.uid // empty')

                      if [ -n "$component_uid" ]; then
                        echo "Deleting Backstage Component: $app_repo_name (UID: $component_uid)"
                        curl -s -X DELETE \
                          -H "Authorization: Bearer $RHDH_TOKEN" \
                          "$RHDH_URL/api/catalog/entities/by-uid/$component_uid"
                        echo "Component deletion status: $?"
                      else
                        echo "No Backstage Component found with name: $app_repo_name"
                      fi

                      echo "Cleaning Backstage Resources for $app_repo_name using URL: $RHDH_URL"
                      resource_response=$(curl -s -X GET \
                        -H "Authorization: Bearer $RHDH_TOKEN" \
                        "$RHDH_URL/api/catalog/entities?filter=kind=resource,metadata.name=$app_repo_name")

                      resource_uid=$(echo "$resource_response" | jq -r '.items[0].metadata.uid // empty')

                      if [ -n "$resource_uid" ]; then
                        echo "Deleting Backstage Resource: $app_repo_name (UID: $resource_uid)"
                        curl -s -X DELETE \
                          -H "Authorization: Bearer $RHDH_TOKEN" \
                          "$RHDH_URL/api/catalog/entities/by-uid/$resource_uid"
                        echo "Resource deletion status: $?"
                      else
                        echo "No Backstage Resource found with name: $app_repo_name"
                      fi

                      echo "Cleaning Backstage Locations for $app_repo_name using URL: $RHDH_URL"
                      location_app_target="https://github.com/${full_app_repo}/blob/main/catalog-info.yaml.yaml"
                      location_response=$(curl -s -X GET \
                        -H "Authorization: Bearer $RHDH_TOKEN" \
                        "$RHDH_URL/api/catalog/entities?filter=kind=location")

                      # Find location that has the target repo in its target field
                      location_uid=$(echo "$location_response" | jq -r --arg target "$location_app_target" \
                        '.items[] | select(.spec.target | contains($target)) | .metadata.uid // empty')

                      if [ -n "$location_uid" ]; then
                        echo "Deleting Backstage Location with target: $location_app_target (UID: $location_uid)"
                        curl -s -X DELETE \
                          -H "Authorization: Bearer $RHDH_TOKEN" \
                          "$RHDH_URL/api/catalog/entities/by-uid/$location_uid"
                        echo "Location deletion status: $?"
                      else
                        echo "No Backstage Location found with target: $location_app_target"
                      fi
                    else
                      echo "found application $name. Age: $age m - skipping"
                    fi
                    sleep 2
                  done